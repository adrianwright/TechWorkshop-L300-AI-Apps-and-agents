name: Build, Push, Deploy (ACR -> Container App)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write

concurrency:
  group: containerapp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login to Azure using OIDC (recommended). You must configure these secrets:
      # AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Set these secrets:
      # ACR_LOGIN_SERVER (e.g., myregistry.azurecr.io)
      # ACR_NAME (e.g., myregistry)
      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build & push image (context: src/)
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.repository }}:${{ github.sha }}
        run: |
          echo "Building $IMAGE"
          docker build -f src/Dockerfile -t "$IMAGE" src
          docker push "$IMAGE"

      # Set these secrets:
      # CONTAINERAPP_NAME, CONTAINERAPP_RESOURCE_GROUP
      - name: Deploy to Azure Container App (update image + env vars)
        env:
          APP_NAME: ${{ secrets.CONTAINERAPP_NAME }}
          RG: ${{ secrets.CONTAINERAPP_RESOURCE_GROUP }}
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/${{ github.repository }}:${{ github.sha }}
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE" \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ secrets.gpt_endpoint }}" \
              embedding_endpoint="${{ secrets.embedding_endpoint }}" \
              phi_4_endpoint="${{ secrets.phi_4_endpoint }}"
